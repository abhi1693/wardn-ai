name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: wardn/backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint backend
        run: ruff check .

      - name: Test backend
        run: pytest tests

      - name: Validate Alembic migrations
        run: alembic upgrade head --sql > /tmp/wardn-alembic.sql

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies for OpenAPI export
        run: python -m pip install -e "wardn/backend[dev]"

      - name: Generate OpenAPI client
        run: npm run web:api:generate

      - name: Check generated API client is current
        run: git diff --exit-code -- wardn/frontend/openapi wardn/frontend/lib/api/generated

      - name: Lint frontend
        run: npm run web:lint

      - name: Build frontend
        run: npm run web:build
