name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      WARDN_TEST_DATABASE_URL: postgresql+asyncpg://wardn:wardn@localhost:5432/wardn_test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: wardn_test
          POSTGRES_USER: wardn
          POSTGRES_PASSWORD: wardn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wardn -d wardn_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Lint backend
        run: npm run backend:lint

      - name: Type-check backend
        run: npm run backend:typecheck

      - name: Test backend units
        run: npm run backend:test:unit

      - name: Test backend against PostgreSQL
        run: npm run backend:test:integration

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate OpenAPI client
        run: npm run web:api:generate

      - name: Check generated API client is current
        run: git diff --exit-code -- wardn/frontend/openapi wardn/frontend/lib/api/generated

      - name: Lint frontend
        run: npm run web:lint

      - name: Build frontend
        run: npm run web:build
